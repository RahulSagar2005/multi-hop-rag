{% extends "base.html" %}
{% block title %}Profile — MultiHop RAG{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="auth-container" style="max-width: 520px;">
        <div class="auth-header">
            <h1 class="auth-title">Your Profile</h1>
            <p class="auth-subtitle">Signed in as {{ user.email }}</p>
        </div>
        <div class="auth-card">
            <div class="profile-field">
                <label>Name</label>
                <span>{{ user.name }}</span>
            </div>
            <div class="profile-field">
                <label>Email</label>
                <span>{{ user.email }}</span>
            </div>
            <div class="profile-field">
                <label>Member since</label>
                <span>{{ user.created[:10] }}</span>
            </div>
            <a href="{{ url_for('logout') }}" class="btn-submit" style="display:block; text-align:center; margin-top: 1.5rem; text-decoration:none;">
                Sign out
            </a>
        </div>
    </div>
</section>
{% endblock %}
